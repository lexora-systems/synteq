name = "synteq"
main = ".open-next/worker.js"
compatibility_date = "2026-03-27"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Required runtime variables must be set in the Cloudflare Worker environment
# (Dashboard or CI-managed wrangler deploy), not via placeholder values here:
# - SYNTEQ_WEB_API_BASE_URL=https://synteq-api-ztock2gtnq-as.a.run.app
# - API_BASE_URL=https://synteq-api-ztock2gtnq-as.a.run.app
# - NEXT_PUBLIC_API_BASE_URL=https://synteq-api-ztock2gtnq-as.a.run.app
