version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: synteq-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: synteq
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: synteq-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: synteq-api
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: mysql://root:root@mysql:3306/synteq
      REDIS_URL: redis://redis:6379
      REDIS_REQUIRED: ${REDIS_REQUIRED:-false}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-synteq}
      BIGQUERY_PROJECT_ID: ${BIGQUERY_PROJECT_ID:-your-gcp-project}
      BIGQUERY_DATASET: ${BIGQUERY_DATASET:-synteq}
      BIGQUERY_KEY_JSON: ${BIGQUERY_KEY_JSON:-}
      EMAIL_DEV_MODE: ${EMAIL_DEV_MODE:-true}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BIGQUERY_AGG_LOOKBACK_MINUTES: ${BIGQUERY_AGG_LOOKBACK_MINUTES:-15}
      PUBSUB_PROJECT_ID: ${PUBSUB_PROJECT_ID:-}
      PUBSUB_TOPIC_INGEST: ${PUBSUB_TOPIC_INGEST:-}
      PUBSUB_PUSH_SHARED_SECRET: ${PUBSUB_PUSH_SHARED_SECRET:-}
      ENABLE_SECRET_MANAGER: ${ENABLE_SECRET_MANAGER:-false}
      SYNTEQ_API_KEY_SALT: ${SYNTEQ_API_KEY_SALT:-replace-with-long-random-salt}
      INGEST_HMAC_SECRET: ${INGEST_HMAC_SECRET:-}
      INGEST_HMAC_REQUIRED: ${INGEST_HMAC_REQUIRED:-false}
      INGEST_SIGNATURE_MAX_SKEW_SEC: ${INGEST_SIGNATURE_MAX_SKEW_SEC:-300}
      INGEST_DEDUPE_TTL_SEC: ${INGEST_DEDUPE_TTL_SEC:-900}
      INGEST_RATE_LIMIT_PER_MIN: ${INGEST_RATE_LIMIT_PER_MIN:-600}
      MAX_INGEST_BODY_BYTES: ${MAX_INGEST_BODY_BYTES:-262144}
      SLACK_DEFAULT_WEBHOOK_URL: ${SLACK_DEFAULT_WEBHOOK_URL:-}
      JWT_SECRET: ${JWT_SECRET:-replace-with-long-random-jwt-secret}
      DASHBOARD_ADMIN_EMAIL: ${DASHBOARD_ADMIN_EMAIL:-admin@synteq.local}
      DASHBOARD_ADMIN_PASSWORD: ${DASHBOARD_ADMIN_PASSWORD:-ChangeMe123!}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-}
      CORS_ORIGIN: http://localhost:3000
      AUTH_LOGIN_MAX_ATTEMPTS_PER_IP: ${AUTH_LOGIN_MAX_ATTEMPTS_PER_IP:-10}
      AUTH_LOGIN_MAX_ATTEMPTS_PER_EMAIL: ${AUTH_LOGIN_MAX_ATTEMPTS_PER_EMAIL:-5}
      AUTH_LOGIN_WINDOW_SEC: ${AUTH_LOGIN_WINDOW_SEC:-900}
      AUTH_LOGIN_LOCKOUT_SEC: ${AUTH_LOGIN_LOCKOUT_SEC:-900}
      METRICS_CACHE_TTL_SEC: ${METRICS_CACHE_TTL_SEC:-45}
      INCIDENT_ESCALATION_MINUTES: ${INCIDENT_ESCALATION_MINUTES:-20}
      INCIDENT_COOLDOWN_WINDOWS: ${INCIDENT_COOLDOWN_WINDOWS:-3}
      ALERT_DISPATCH_MAX_RETRIES: ${ALERT_DISPATCH_MAX_RETRIES:-3}
      ALERT_DISPATCH_BACKOFF_BASE_SEC: ${ALERT_DISPATCH_BACKOFF_BASE_SEC:-30}
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: synteq-web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      API_BASE_URL: http://api:8080
    ports:
      - "3000:3000"

volumes:
  mysql_data:
